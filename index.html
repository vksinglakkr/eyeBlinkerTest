<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Eye Exercise Tracker</title>
<style>
body{font-family:Arial,sans-serif;margin:20px;background:#f4f4f4}
.card{max-width:900px;margin:auto;background:white;padding:20px;border-radius:12px}
video{width:100%;max-width:500px;border:1px solid #ccc;border-radius:8px}
.progress{width:100%;height:24px;background:#ddd;border-radius:12px;overflow:hidden}
.bar{height:100%;width:0%;background:linear-gradient(90deg,green,gold)}
.dot{width:18px;height:18px;background:#000;border-radius:50%;margin:15px auto}
.stat{margin:6px 0}
button,select{padding:8px;margin:5px}
</style>
</head>
<body>
<div class="card">
<h2>Eye Exercise Tracker (Prototype)</h2>
<p>This version starts the front camera and provides the exercise workflow. Automatic blink detection can be added in a later version using MediaPipe.</p>

<select id="mode">
<option>Observation Test</option>
<option>No-Blink Challenge</option>
</select>

<select id="duration">
<option value="60">1 Minute</option>
<option value="120">2 Minutes</option>
<option value="300">5 Minutes</option>
</select>

<button onclick="startCam()">Start Camera</button>
<button onclick="startTest()">Start Test</button>

<div class="dot"></div>

<video id="video" autoplay playsinline muted></video>

<h3 id="timer">00:00</h3>

<div class="progress"><div class="bar" id="bar"></div></div>

<div class="stat">Status: <span id="status">Idle</span></div>
<div class="stat">Elapsed: <span id="elapsed">0</span> sec</div>

<script>
let startTime=null;
let timerHandle=null;

async function startCam(){
 try{
  const stream=await navigator.mediaDevices.getUserMedia({
   video:{facingMode:"user"},audio:false
  });
  document.getElementById("video").srcObject=stream;
  document.getElementById("status").innerText="Camera Connected";
 }catch(e){
  document.getElementById("status").innerText="Camera Permission Denied";
 }
}

function startTest(){
 let duration=parseInt(document.getElementById("duration").value);
 startTime=Date.now();
 document.getElementById("status").innerText="Running";
 clearInterval(timerHandle);

 timerHandle=setInterval(()=>{
   let sec=Math.floor((Date.now()-startTime)/1000);
   document.getElementById("elapsed").innerText=sec;

   let m=String(Math.floor(sec/60)).padStart(2,"0");
   let s=String(sec%60).padStart(2,"0");
   document.getElementById("timer").innerText=m+":"+s;

   let pct=Math.min(100,(sec/duration)*100);
   document.getElementById("bar").style.width=pct+"%";

   if(sec>=duration){
      clearInterval(timerHandle);
      document.getElementById("status").innerText="Completed";
   }
 },200);
}
</script>
</div>
</body>
</html>
