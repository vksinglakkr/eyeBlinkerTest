<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Eye Exercise Tracker V5</title>
<style>
body{margin:0;background:#0b0b0b;color:#fff;font-family:Arial}
.top{position:sticky;top:0;background:#151515;padding:10px;z-index:100}
button,select,input{padding:8px;margin:4px}
.main{display:flex;gap:10px;padding:10px;height:420px}
.left,.right{background:#161616;border-radius:12px;padding:10px}
.left{width:35%}
.right{width:65%;display:flex;align-items:center;justify-content:center;background:#000}
.cameraFrame{height:300px;overflow:hidden;border-radius:10px;background:#000}
video{width:100%;height:100%;object-fit:cover;transform-origin:center}
#targetArea{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.dot{background:#fff;border-radius:50%}
.bull{border-radius:50%;background:radial-gradient(circle,black 10%,white 11%,white 25%,black 26%,black 40%,white 41%,white 55%,black 56%)}
.flame{animation:f .2s infinite alternate}
@keyframes f{from{transform:scale(1)}to{transform:scale(1.05)}}
.pend{position:relative;animation:s 4s infinite ease-in-out}
@keyframes s{0%{left:-180px}50%{left:180px}100%{left:-180px}}
.stats{display:flex;justify-content:space-around;flex-wrap:wrap;padding:10px}
.box{text-align:center}
.big{font-size:48px;font-weight:bold}
.progress{height:26px;background:#333;border-radius:20px;overflow:hidden;margin:10px}
.bar{height:100%;width:0;background:linear-gradient(90deg,#00d26a,#ffd700)}
</style>
</head>
<body>
<div class="top">
<button onclick="startCamera()">📷 Camera</button>
<button onclick="startSession()">▶ Start</button>
<label><input type="checkbox" id="showCam" checked onchange="toggleCam()"> Show Camera</label>
<select id="duration"><option value="60">1 Min</option><option value="120">2 Min</option><option value="300">5 Min</option></select>
<select id="target" onchange="renderTarget()">
<option value="flame">🔥 Flame</option>
<option value="dot">⚫ Dot</option>
<option value="bull">🎯 Circles</option>
<option value="pend">🪀 Pendulum</option>
</select>
</div>

<div class="main">
<div class="left" id="camPanel">
<div id="camStatus">Camera Not Started</div>
<div class="cameraFrame"><video id="video" autoplay playsinline muted></video></div>
<div>
Zoom <input type="range" id="zoom" min="1" max="4" step="0.1" value="1" oninput="video.style.transform='scale('+this.value+')'">
</div>
</div>

<div class="right">
<div id="targetArea"></div>
</div>
</div>

<div class="stats">
<div class="box"><div>BLINKS</div><div class="big" id="blinkCount">0</div></div>
<div class="box"><div>STREAK</div><div class="big" id="streak">0.0</div></div>
<div class="box"><div>BEST</div><div class="big" id="best">0.0</div></div>
<div class="box"><div>TIME</div><div class="big" id="time">00:00</div></div>
</div>

<div class="progress"><div class="bar" id="bar"></div></div>
<p style="text-align:center">Prototype: Press <b>B</b> to simulate blink.</p>

<script>
let stream,start,lastBlink,best=0,blinks=0,timer;
async function startCamera(){
try{
stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
video.srcObject=stream; camStatus.innerText="Camera Connected";
}catch(e){camStatus.innerText=e.message;}
}
function toggleCam(){
camPanel.style.display=showCam.checked?'block':'none';
}
function renderTarget(){
let s=300,t=target.value;
if(t==='flame') targetArea.innerHTML='<div class="flame" style="font-size:'+s+'px">🔥</div>';
if(t==='dot') targetArea.innerHTML='<div class="dot" style="width:'+s+'px;height:'+s+'px"></div>';
if(t==='bull') targetArea.innerHTML='<div class="bull" style="width:'+s+'px;height:'+s+'px"></div>';
if(t==='pend') targetArea.innerHTML='<div class="pend" style="font-size:150px">⚫</div>';
}
function startSession(){
clearInterval(timer);
let total=parseInt(duration.value);
start=Date.now(); lastBlink=start; blinks=0; blinkCount.innerText='0';
timer=setInterval(()=>{
let sec=Math.floor((Date.now()-start)/1000);
time.innerText=String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0');
streak.innerText=((Date.now()-lastBlink)/1000).toFixed(1);
bar.style.width=Math.min(100,sec/total*100)+'%';
if(sec>=total){clearInterval(timer);}
},100);
}
document.addEventListener('keydown',e=>{
if(e.key.toLowerCase()==='b'){
blinks++; blinkCount.innerText=blinks;
let st=(Date.now()-lastBlink)/1000;
if(st>best){best=st; document.getElementById('best').innerText=best.toFixed(1);}
lastBlink=Date.now();
}
});
renderTarget();
</script>
</body>
</html>
