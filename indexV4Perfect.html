<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Eye Exercise V4</title>
<style>
body{margin:0;background:#0b0b0b;color:#fff;font-family:Arial}
.top{position:sticky;top:0;background:#151515;padding:10px;z-index:100}
button,select,input{padding:8px;margin:4px}
.wrap{max-width:900px;margin:auto;padding:10px}
.cameraFrame{width:100%;height:320px;overflow:hidden;border:2px solid #444;border-radius:12px;background:#000;position:relative}
video{width:100%;height:100%;object-fit:cover;transform-origin:center center}
#targetArea{height:260px;display:flex;align-items:center;justify-content:center;background:#000;border-radius:12px;margin-top:10px}
.big{font-size:72px;font-weight:bold;text-align:center}
.label{text-align:center;font-size:24px}
.progress{height:28px;background:#333;border-radius:20px;overflow:hidden}
.bar{height:100%;width:0%;background:linear-gradient(90deg,#00d26a,#ffd700)}
.dot{background:white;border-radius:50%}
.bull{border-radius:50%;background:radial-gradient(circle,black 10%,white 11%,white 25%,black 26%,black 40%,white 41%,white 55%,black 56%)}
.flame{animation:f .2s infinite alternate}
@keyframes f{from{transform:scale(1)}to{transform:scale(1.06)}}
.pend{position:relative;animation:s 4s infinite ease-in-out}
@keyframes s{0%{left:-160px}50%{left:160px}100%{left:-160px}}
</style>
</head>
<body>
<div class="top">
<button onclick="startCamera()">📷 Start Camera</button>
<button onclick="stopCamera()">⛔ Stop</button>
<button onclick="startSession()">▶ Start Session</button>
<select id="duration"><option value="60">1 Min</option><option value="120">2 Min</option><option value="300">5 Min</option></select>
<select id="target" onchange="renderTarget()">
<option value="flame">🔥 Flame</option>
<option value="pend">🪀 Pendulum</option>
<option value="bull">🎯 Circles</option>
<option value="dot">⚫ Dot</option>
</select>
</div>

<div class="wrap">
<div id="camStatus">Camera Not Started</div>
<div class="cameraFrame">
<video id="video" autoplay playsinline muted></video>
</div>

<div>
Zoom <input type="range" id="zoom" min="1" max="4" step="0.1" value="1" oninput="applyZoom()">
Target Size <input type="range" id="size" min="80" max="450" value="220" oninput="renderTarget()">
</div>

<div id="targetArea"></div>

<div class="label">BLINK COUNT</div>
<div class="big" id="blinkCount">0</div>

<div class="label">CURRENT STREAK</div>
<div class="big" id="streak">0.0</div>

<div class="label">BEST STREAK</div>
<div class="big" id="best">0.0</div>

<div class="progress"><div class="bar" id="bar"></div></div>
<div class="big" id="time" style="font-size:48px">00:00</div>

<p style="text-align:center">Press <b>B</b> to simulate a blink.</p>
</div>

<script>
let stream,start,lastBlink,best=0,blink=0,timer;

async function startCamera(){
try{
stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
video.srcObject=stream;
camStatus.innerText="Camera Connected";
}catch(e){camStatus.innerText="Camera Error: "+e.message;}
}
function stopCamera(){
if(stream) stream.getTracks().forEach(t=>t.stop());
camStatus.innerText="Camera Stopped";
}
function applyZoom(){
video.style.transform='scale('+zoom.value+')';
}
function renderTarget(){
let t=target.value,s=size.value;
if(t==='flame') targetArea.innerHTML='<div class="flame" style="font-size:'+s+'px">🔥</div>';
if(t==='pend') targetArea.innerHTML='<div class="pend" style="font-size:'+Math.max(100,s/2)+'px">⚫</div>';
if(t==='bull') targetArea.innerHTML='<div class="bull" style="width:'+s+'px;height:'+s+'px"></div>';
if(t==='dot') targetArea.innerHTML='<div class="dot" style="width:'+s+'px;height:'+s+'px"></div>';
}
function startSession(){
clearInterval(timer);
let total=parseInt(duration.value);
start=Date.now();
lastBlink=start;
blink=0;
blinkCount.innerText='0';
timer=setInterval(()=>{
let sec=Math.floor((Date.now()-start)/1000);
time.innerText=String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0');
bar.style.width=Math.min(100,sec/total*100)+'%';
streak.innerText=((Date.now()-lastBlink)/1000).toFixed(1);
if(sec>=total){clearInterval(timer);alert('Session Complete');}
},100);
}
document.addEventListener('keydown',e=>{
if(e.key.toLowerCase()==='b'){
blink++;
blinkCount.innerText=blink;
let st=(Date.now()-lastBlink)/1000;
if(st>best){best=st;document.getElementById('best').innerText=best.toFixed(1);}
lastBlink=Date.now();
}
});
renderTarget();
</script>
</body>
</html>
